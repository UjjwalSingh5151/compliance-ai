name: CI / CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend tests (the only thing CI needs to gate right now) ─────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        run: npm test
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-test
          ADMIN_USER_ID: test-admin-id

  # ── Deploy to staging — only when staging branch is pushed ───────────────────
  deploy-staging:
    name: Deploy → staging
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Trigger Render staging deploy
        env:
          HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -X POST "$HOOK" -H "Content-Type: application/json" --fail-with-body
          else
            echo "RENDER_STAGING_DEPLOY_HOOK not set — skipping"
          fi

  # ── Deploy to production — only when main branch is pushed ───────────────────
  deploy-production:
    name: Deploy → production
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render production deploy
        env:
          HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -s -X POST "$HOOK" -H "Content-Type: application/json" --fail-with-body
          else
            echo "RENDER_PROD_DEPLOY_HOOK not set — skipping"
          fi
